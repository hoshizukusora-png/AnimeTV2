name: Build AnimeTV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/*.apk artifacts/AnimeTV_v1.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimeTV-Release-APK
          path: artifacts/AnimeTV_v1.0.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=============================="
          echo "✅ BUILD SUKSES!"
          echo "=============================="
          ls -lh artifacts/
          echo ""
          echo "Download APK dari tab Artifacts di atas ↑"

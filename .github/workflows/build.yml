name: Build AnimeTV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build AnimeTV APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore animatv.jks \
            -alias animatv \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass animatv123 \
            -keypass animatv123 \
            -dname "CN=AnimeTV, OU=AnimeTV, O=AnimeTV, L=ID, ST=ID, C=ID"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/33.0.2/apksigner sign \
            --ks animatv.jks \
            --ks-key-alias animatv \
            --ks-pass pass:animatv123 \
            --key-pass pass:animatv123 \
            --out AnimeTV_v1.0_signed.apk \
            app/build/outputs/apk/release/AnimeTV_v1.0.apk

      - name: Verify APK
        run: |
          $ANDROID_HOME/build-tools/33.0.2/apksigner verify AnimeTV_v1.0_signed.apk
          echo "APK verified successfully!"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: AnimeTV-Signed-APK
          path: AnimeTV_v1.0_signed.apk
          retention-days: 30

      - name: Show result
        run: |
          echo "=============================="
          echo "BUILD SUKSES!"
          echo "=============================="
          ls -lh AnimeTV_v1.0_signed.apk

name: Build AnimeTV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build AnimeTV APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore animatv.jks \
            -alias animatv \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass animatv123 \
            -keypass animatv123 \
            -dname "CN=AnimeTV, OU=AnimeTV, O=AnimeTV, L=ID, ST=ID, C=ID"

      # ================================================================
      # ANALISIS KODE: Scan potensi masalah SEBELUM build
      # ================================================================
      - name: Analyze Code for Potential Crash Sources
        run: |
          mkdir -p diagnostics
          SRC="app/src/main/java"
          REPORT="diagnostics/crash_analysis.txt"

          echo "========================================" > $REPORT
          echo "  ANALISIS POTENSI CRASH - AnimeTV" >> $REPORT
          echo "  Tanggal: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $REPORT
          echo "  Commit : ${GITHUB_SHA}" >> $REPORT
          echo "  Branch : ${GITHUB_REF_NAME}" >> $REPORT
          echo "========================================" >> $REPORT
          echo "" >> $REPORT

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          echo "[1] LATEINIT VAR - risiko UninitializedPropertyAccessException" >> $REPORT
          echo "    Penyebab force close: variabel dipakai sebelum diisi nilainya." >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          grep -rn "lateinit var" $SRC --include="*.kt" | awk -F: '{print "  File: " $1 "\n  Baris: " $2 "\n  Kode : " $3 "\n"}' >> $REPORT || true

          echo "" >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          echo "[2] OPERATOR !! (force non-null) - risiko NullPointerException" >> $REPORT
          echo "    Penyebab force close: nilai null dipaksakan, lalu diakses." >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          grep -rn "!!" $SRC --include="*.kt" | awk -F: '{print "  File: " $1 "\n  Baris: " $2 "\n  Kode : " $3 "\n"}' >> $REPORT || true

          echo "" >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          echo "[3] THREAD / HANDLER / runOnUiThread" >> $REPORT
          echo "    Penyebab force close: exception di background thread yang tidak ditangkap." >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          grep -rn "Thread\|runOnUiThread\|Handler\|Runnable" $SRC --include="*.kt" | awk -F: '{print "  File: " $1 "\n  Baris: " $2 "\n  Kode : " $3 "\n"}' >> $REPORT || true

          echo "" >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          echo "[4] findViewById TANPA NULL CHECK" >> $REPORT
          echo "    Penyebab force close: View tidak ada di layout (ID salah/beda layout)." >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          grep -rn "findViewById" $SRC --include="*.kt" | grep -v "?\." | grep -v "?: " | grep -v "??" | awk -F: '{print "  File: " $1 "\n  Baris: " $2 "\n  Kode : " $3 "\n"}' >> $REPORT || true

          echo "" >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          echo "[5] POTENSI NETWORK DI MAIN THREAD" >> $REPORT
          echo "    Penyebab force close: NetworkOnMainThreadException." >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          grep -rn "\.execute()\|URL(\|HttpURLConnection\|openConnection" $SRC --include="*.kt" | awk -F: '{print "  File: " $1 "\n  Baris: " $2 "\n  Kode : " $3 "\n"}' >> $REPORT || true

          echo "" >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          echo "[6] TYPE CAST BERISIKO (as, bukan as?)" >> $REPORT
          echo "    Penyebab force close: ClassCastException saat tipe data tidak cocok." >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          grep -rn " as [A-Z]" $SRC --include="*.kt" | grep -v "as?" | awk -F: '{print "  File: " $1 "\n  Baris: " $2 "\n  Kode : " $3 "\n"}' >> $REPORT || true

          echo "" >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          echo "[7] INTENT EXTRAS TANPA NULL CHECK" >> $REPORT
          echo "    Penyebab force close: NullPointerException saat extras tidak ada." >> $REPORT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $REPORT
          grep -rn "intent\.get\|getIntent()" $SRC --include="*.kt" | awk -F: '{print "  File: " $1 "\n  Baris: " $2 "\n  Kode : " $3 "\n"}' >> $REPORT || true

          echo "" >> $REPORT
          echo "========================================" >> $REPORT
          echo "  RINGKASAN JUMLAH TITIK RISIKO" >> $REPORT
          echo "========================================" >> $REPORT
          LATEINIT=$(grep -rn "lateinit var" $SRC --include="*.kt" | wc -l)
          BANGBANG=$(grep -rn "!!" $SRC --include="*.kt" | wc -l)
          FINDVIEW=$(grep -rn "findViewById" $SRC --include="*.kt" | grep -v "?\." | grep -v "?: " | wc -l)
          CAST=$(grep -rn " as [A-Z]" $SRC --include="*.kt" | grep -v "as?" | wc -l)
          echo "  lateinit var             : $LATEINIT titik" >> $REPORT
          echo "  Operator !!              : $BANGBANG titik" >> $REPORT
          echo "  findViewById tanpa null  : $FINDVIEW titik" >> $REPORT
          echo "  Type cast berisiko       : $CAST titik" >> $REPORT
          echo "  TOTAL                    : $((LATEINIT + BANGBANG + FINDVIEW + CAST)) titik risiko" >> $REPORT

          echo "" >> $REPORT
          echo "========================================" >> $REPORT
          echo "  PENJELASAN UMUM PENYEBAB FORCE CLOSE" >> $REPORT
          echo "========================================" >> $REPORT
          echo "  1. NullPointerException" >> $REPORT
          echo "     -> Mengakses objek yang nilainya null." >> $REPORT
          echo "     -> Cari: operator !!, lateinit var yang belum diisi." >> $REPORT
          echo "" >> $REPORT
          echo "  2. UninitializedPropertyAccessException" >> $REPORT
          echo "     -> lateinit var diakses sebelum diisi nilai." >> $REPORT
          echo "     -> Cek: binding/variabel sudah diinisialisasi?" >> $REPORT
          echo "" >> $REPORT
          echo "  3. NetworkOnMainThreadException" >> $REPORT
          echo "     -> Network call dilakukan di UI thread." >> $REPORT
          echo "     -> Solusi: gunakan Thread, Coroutine, atau OkHttp async." >> $REPORT
          echo "" >> $REPORT
          echo "  4. ClassCastException" >> $REPORT
          echo "     -> Cast tipe data yang salah." >> $REPORT
          echo "" >> $REPORT
          echo "  5. Resources.NotFoundException" >> $REPORT
          echo "     -> Akses resource (layout/drawable/raw) yang tidak ada." >> $REPORT
          echo "     -> Di AnimeTV: sering dari R.raw.splash_video yang tidak ada." >> $REPORT
          echo "" >> $REPORT
          echo "  6. ActivityNotFoundException" >> $REPORT
          echo "     -> startActivity() ke Activity tidak ada di AndroidManifest." >> $REPORT
          echo "" >> $REPORT
          echo "  7. OutOfMemoryError" >> $REPORT
          echo "     -> Gambar/bitmap terlalu besar dimuat ke memori sekaligus." >> $REPORT
          echo "" >> $REPORT
          echo "  CARA BACA LOGCAT:" >> $REPORT
          echo "  1. Sambungkan HP ke PC, aktifkan USB Debugging" >> $REPORT
          echo "  2. Jalankan: adb logcat -d | grep -E 'FATAL|AndroidRuntime|com.animatv'" >> $REPORT
          echo "  3. Cari baris 'FATAL EXCEPTION' lalu baris 'Caused by:'" >> $REPORT
          echo "     Itulah penyebab crash sebenarnya." >> $REPORT
          echo "========================================" >> $REPORT

          echo "Analisis selesai."

      # ================================================================
      # BUILD APK
      # ================================================================
      - name: Build Release APK
        id: build_apk
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee diagnostics/build_log.txt
        continue-on-error: true

      - name: Check Build Result and Extract Errors
        run: |
          BUILD_LOG="diagnostics/build_log.txt"
          BUILD_ERRORS="diagnostics/build_errors.txt"

          echo "========================================" > $BUILD_ERRORS
          echo "  HASIL BUILD - AnimeTV" >> $BUILD_ERRORS
          echo "  Tanggal: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $BUILD_ERRORS
          echo "  Commit : ${GITHUB_SHA}" >> $BUILD_ERRORS
          echo "========================================" >> $BUILD_ERRORS
          echo "" >> $BUILD_ERRORS

          if grep -q "BUILD SUCCESSFUL" $BUILD_LOG; then
            echo "  STATUS: BUILD BERHASIL" >> $BUILD_ERRORS
            echo "" >> $BUILD_ERRORS
            echo "  APK berhasil dibuat. Download di tab Artifacts." >> $BUILD_ERRORS
          else
            echo "  STATUS: BUILD GAGAL" >> $BUILD_ERRORS
            echo "" >> $BUILD_ERRORS
            echo "  ── ERROR DARI GRADLE ──" >> $BUILD_ERRORS
            grep -E "error:|Error:|FAILED|> Task|Exception" $BUILD_LOG | head -60 >> $BUILD_ERRORS || true
            echo "" >> $BUILD_ERRORS
            echo "  ── CAUSED BY ──" >> $BUILD_ERRORS
            grep -A3 "Caused by:" $BUILD_LOG | head -40 >> $BUILD_ERRORS || true
            echo "" >> $BUILD_ERRORS
            echo "  Lihat build_log.txt untuk detail lengkap." >> $BUILD_ERRORS
          fi

          echo "" >> $BUILD_ERRORS
          echo "  ── GRADLE WARNINGS ──" >> $BUILD_ERRORS
          grep -i "warning\|deprecated\|obsolete" $BUILD_LOG | head -20 >> $BUILD_ERRORS || echo "  (tidak ada warning)" >> $BUILD_ERRORS

          cat $BUILD_ERRORS

          if ! grep -q "BUILD SUCCESSFUL" $BUILD_LOG; then
            echo "Build GAGAL. Cek diagnostics/build_errors.txt"
            exit 1
          fi

      # ================================================================
      # SIGN APK
      # ================================================================
      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/33.0.2/apksigner sign \
            --ks animatv.jks \
            --ks-key-alias animatv \
            --ks-pass pass:animatv123 \
            --key-pass pass:animatv123 \
            --out AnimeTV_v1.0_signed.apk \
            app/build/outputs/apk/release/AnimeTV_v1.0.apk

      - name: Verify APK
        run: |
          $ANDROID_HOME/build-tools/33.0.2/apksigner verify AnimeTV_v1.0_signed.apk
          echo "APK verified successfully!"

      # ================================================================
      # ANALISIS APK
      # ================================================================
      - name: Analyze Built APK
        run: |
          APK="AnimeTV_v1.0_signed.apk"
          REPORT="diagnostics/apk_analysis.txt"

          echo "========================================" > $REPORT
          echo "  ANALISIS APK - AnimeTV" >> $REPORT
          echo "  Tanggal: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $REPORT
          echo "========================================" >> $REPORT
          echo "" >> $REPORT
          echo "  Ukuran APK: $(du -sh $APK | cut -f1)" >> $REPORT
          echo "" >> $REPORT
          echo "  ── PERMISSIONS ──" >> $REPORT
          echo "  (Permission tidak perlu bisa ditolak user dan menyebabkan crash)" >> $REPORT
          $ANDROID_HOME/build-tools/33.0.2/aapt dump permissions $APK 2>/dev/null >> $REPORT || true
          echo "" >> $REPORT
          echo "  ── INFO APK ──" >> $REPORT
          $ANDROID_HOME/build-tools/33.0.2/aapt dump badging $APK 2>/dev/null | grep -E "package|sdkVersion|targetSdk|launchable-activity" >> $REPORT || true

          cat $REPORT

      # ================================================================
      # LAPORAN GABUNGAN
      # ================================================================
      - name: Generate Final Diagnosis Report
        run: |
          FINAL="diagnostics/LAPORAN_DIAGNOSIS_LENGKAP.txt"

          echo "╔══════════════════════════════════════════╗" > $FINAL
          echo "║   LAPORAN DIAGNOSIS ANIMATV - LENGKAP   ║" >> $FINAL
          echo "╚══════════════════════════════════════════╝" >> $FINAL
          echo "  Build  : ${GITHUB_RUN_NUMBER}" >> $FINAL
          echo "  Commit : ${GITHUB_SHA}" >> $FINAL
          echo "  Branch : ${GITHUB_REF_NAME}" >> $FINAL
          echo "  Tanggal: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $FINAL
          echo "" >> $FINAL
          echo "  Isi file ini:" >> $FINAL
          echo "  1. Analisis potensi force close dari kode (sebelum build)" >> $FINAL
          echo "  2. Hasil build Gradle & error jika ada" >> $FINAL
          echo "  3. Analisis APK yang dihasilkan" >> $FINAL
          echo "  4. Panduan debugging force close" >> $FINAL
          echo "" >> $FINAL

          echo "══════ BAGIAN 1: ANALISIS KODE ══════" >> $FINAL
          cat diagnostics/crash_analysis.txt >> $FINAL
          echo "" >> $FINAL

          echo "══════ BAGIAN 2: HASIL BUILD ══════" >> $FINAL
          cat diagnostics/build_errors.txt >> $FINAL
          echo "" >> $FINAL

          echo "══════ BAGIAN 3: ANALISIS APK ══════" >> $FINAL
          cat diagnostics/apk_analysis.txt >> $FINAL
          echo "" >> $FINAL

          echo "╔══════════════════════════════════════════╗" >> $FINAL
          echo "║   PANDUAN DEBUGGING FORCE CLOSE          ║" >> $FINAL
          echo "╚══════════════════════════════════════════╝" >> $FINAL
          echo "" >> $FINAL
          echo "  LANGKAH 1: Install APK, buka di HP, tunggu crash." >> $FINAL
          echo "" >> $FINAL
          echo "  LANGKAH 2: Sambungkan HP ke PC via USB." >> $FINAL
          echo "             Aktifkan USB Debugging di HP." >> $FINAL
          echo "             Jalankan perintah ini di terminal PC:" >> $FINAL
          echo "" >> $FINAL
          echo "    adb logcat -d | grep -E 'FATAL|AndroidRuntime|com.animatv'" >> $FINAL
          echo "" >> $FINAL
          echo "  LANGKAH 3: Cari baris 'FATAL EXCEPTION', lalu cari 'Caused by:'" >> $FINAL
          echo "             Baris Caused by = penyebab crash sebenarnya." >> $FINAL
          echo "" >> $FINAL
          echo "  TIPS CEPAT LOKASI CRASH:" >> $FINAL
          echo "  - Force close saat BARU DIBUKA? -> SplashActivity.kt / App.kt" >> $FINAL
          echo "  - Force close saat BUKA PLAYER? -> PlayerActivity.kt" >> $FINAL
          echo "  - Force close saat LOAD CHANNEL? -> SourcesReader.kt / network" >> $FINAL
          echo "  - Force close di Android lama?  -> Cek minSdkVersion & MultiDex" >> $FINAL
          echo "  - Crash tidak konsisten?         -> Cek Thread/Coroutine tanpa try-catch" >> $FINAL
          echo "" >> $FINAL
          echo "  DICURIGAI UNTUK ANIMATV:" >> $FINAL
          echo "  - R.raw.splash_video tidak ada -> Resources.NotFoundException di Splash" >> $FINAL
          echo "  - binding.textUsers null        -> lateinit belum diinisialisasi" >> $FINAL
          echo "  - Playlist null dari network    -> NullPointerException di MainActivity" >> $FINAL
          echo "══════════════════════════════════════════" >> $FINAL

          echo "Laporan lengkap siap."

      # ================================================================
      # UPLOAD ARTIFACT
      # ================================================================
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: 1_AnimeTV-APK-Signed
          path: AnimeTV_v1.0_signed.apk
          retention-days: 30

      - name: Upload Diagnosis Report
        uses: actions/upload-artifact@v4
        with:
          name: 2_Laporan-Diagnosis-Crash
          path: diagnostics/
          retention-days: 30

      - name: Show Final Summary
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║           BUILD SELESAI                  ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "  APK  : $(ls -lh AnimeTV_v1.0_signed.apk | awk '{print $5, $9}')"
          echo ""
          echo "  2 artifact tersedia di tab Actions > Artifacts:"
          echo "  [1] 1_AnimeTV-APK-Signed"
          echo "      -> File APK untuk diinstall di HP/TV"
          echo ""
          echo "  [2] 2_Laporan-Diagnosis-Crash"
          echo "      -> LAPORAN_DIAGNOSIS_LENGKAP.txt  (semua dalam 1 file)"
          echo "      -> crash_analysis.txt             (analisis kode)"
          echo "      -> apk_analysis.txt               (analisis APK)"
          echo "      -> build_errors.txt               (ringkasan build)"
          echo "      -> build_log.txt                  (log build penuh)"
